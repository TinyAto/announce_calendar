{% extends "monitor/base.html" %}
{% block content %}
<h1>채널 메시지 <span class="channel-badge">{{ channel_id }}</span></h1>
<a href="{% url 'message_list' %}">전체 목록으로</a>
<div class="card">
    {% for msg in messages %}
    <div class="message">
        <div class="message-header">
            <span class="username">{{ msg.username }}</span>
            <span class="timestamp">{{ msg.created_at|date:"Y-m-d H:i:s" }}</span>
        </div>
        <div class="message-text">{{ msg.text|linebreaks }}</div>
    </div>
    {% empty %}
    <p>해당 채널에 저장된 메시지가 없습니다.</p>
    {% endfor %}
</div>
{% endblock %}
